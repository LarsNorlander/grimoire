# Config version for compatibility and deprecations
config-version = 2

# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = []

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# See: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Workspaces that stay alive even when empty
persistent-workspaces = ["Workbench", "Project", "TTY", "Claude", "Music"]

on-mode-changed = []

# See: https://nikitabobko.github.io/AeroSpace/guide#on-window-detected-callback
[[on-window-detected]]
    if.app-id = 'com.apple.finder'
    run = 'layout floating'

[[on-window-detected]]
    if.app-id = 'com.apple.ActivityMonitor'
    run = 'layout floating'

[[on-window-detected]]
    if.app-id = 'com.apple.keychainaccess'
    run = 'layout floating'

[[on-window-detected]]
    if.app-id = 'com.apple.archiveutility'
    run = 'layout floating'

[[on-window-detected]]
    if.app-id = 'com.apple.FontBook'
    run = 'layout floating'

[[on-window-detected]]
    if.app-id = 'com.1password.1password'
    run = 'layout floating'

[[on-window-detected]]
    if.app-id = 'com.apple.MobileSMS'
    run = 'layout floating'

# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
[gaps]
    inner.horizontal = 8
    inner.vertical =   8
    outer.left =       8
    outer.bottom =     8
    outer.top =        8
    outer.right =      8

[mode.main.binding]
    # See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    alt-1 = 'workspace Workbench'
    alt-2 = 'workspace Project'
    alt-3 = 'workspace TTY'
    alt-6 = 'workspace Claude'
    alt-7 = 'workspace Music'
    alt-0 = 'workspace Scratch'

    # Disable macOS hide (breaks tiling)
    cmd-h = []
    cmd-alt-h = []

    # Screenshot to clipboard only
    alt-shift-s = ['exec-and-forget screencapture -ic']

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    alt-shift-1 = ['move-node-to-workspace Workbench', 'workspace Workbench']
    alt-shift-2 = ['move-node-to-workspace Project', 'workspace Project']
    alt-shift-3 = ['move-node-to-workspace TTY', 'workspace TTY']
    alt-shift-6 = ['move-node-to-workspace Claude', 'workspace Claude']
    alt-shift-7 = ['move-node-to-workspace Music', 'workspace Music']
    alt-shift-0 = ['move-node-to-workspace Scratch', 'workspace Scratch']

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    alt-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-semicolon = 'mode service'
    alt-a = 'mode arrange'

[mode.service.binding]
    # See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout

    # reset workspace-to-monitor layout
    d = [
        'move-workspace-to-monitor --workspace Workbench main',
        'move-workspace-to-monitor --workspace Project main',
        'move-workspace-to-monitor --workspace TTY main',
        'move-workspace-to-monitor --workspace Scratch main',
        'move-workspace-to-monitor --workspace Claude secondary',
        'move-workspace-to-monitor --workspace Music secondary',
        'mode main',
    ]

[mode.arrange.binding]
    # See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
    # selection
    h = 'focus left'
    j = 'focus down'
    k = 'focus up'
    l = 'focus right'

    # move
    alt-h = 'move left'
    alt-j = 'move down'
    alt-k = 'move up'
    alt-l = 'move right'

    # join
    alt-shift-h = 'join-with left'
    alt-shift-j = 'join-with down'
    alt-shift-k = 'join-with up'
    alt-shift-l = 'join-with right'

    # layout
    slash = 'layout tiles horizontal vertical'
    comma = 'layout accordion horizontal vertical'

    # resize
    2 = ['exec-and-forget $HOME/.grimoire/cantrips/aerospace/resize-window-pct 25']
    3 = ['exec-and-forget $HOME/.grimoire/cantrips/aerospace/resize-window-pct 33.33']
    4 = ['exec-and-forget $HOME/.grimoire/cantrips/aerospace/resize-window-pct 45']
    5 = ['exec-and-forget $HOME/.grimoire/cantrips/aerospace/resize-window-pct 50']
    6 = ['exec-and-forget $HOME/.grimoire/cantrips/aerospace/resize-window-pct 66.67']
    7 = ['exec-and-forget $HOME/.grimoire/cantrips/aerospace/resize-window-pct 75']
    0 = ['balance-sizes']

    # reset layout
    r = ['flatten-workspace-tree', 'mode main']

    # exit
    esc = 'mode main'
